<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ja oder Nein?</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #bddfff, #8fc5f5);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card {
      width: min(92vw, 520px);
      min-height: 300px;
      background: linear-gradient(145deg, #eef7ff, #dbeeff);
      border-radius: 34px;
      padding: 42px 28px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
      position: relative;
      border: 5px solid rgba(86, 133, 176, 0.9);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 24px;
      border: 3px dashed rgba(255,255,255,0.95);
      pointer-events: none;
    }

    .card::after {
      content: "✦ ✧ ✦";
      position: absolute;
      top: 14px;
      right: 20px;
      font-size: 1.3rem;
      color: rgba(70, 110, 150, 0.85);
      letter-spacing: 6px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 3.2rem);
      color: #3d6f99;
      text-shadow: 2px 2px 0 rgba(255,255,255,0.7);
    }

    p {
      margin: 0 0 34px;
      font-size: 1.15rem;
      color: #5f7994;
    }

    .buttons {
      position: relative;
      height: 130px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 16px 34px;
      font-size: 1.25rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, left 0.2s ease, top 0.2s ease;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
      user-select: none;
    }

    #yesBtn {
      background: #22c55e;
      color: white;
      position: absolute;
      left: 28%;
      top: 42px;
      transform: translateX(-50%);
    }

    #yesBtn:hover {
      transform: translateX(-50%) scale(1.08);
      box-shadow: 0 14px 26px rgba(34, 197, 94, 0.35);
    }

    #noBtn {
      background: #ef4444;
      color: white;
      position: absolute;
      left: 62%;
      top: 42px;
      transform: translateX(-50%);
      z-index: 10;
    }

    .day-list {
      display: grid;
      gap: 12px;
      margin: 22px auto 24px;
      max-width: 320px;
      padding: 0;
      list-style: none;
    }

    .day-list li {
      background: #6eaee6;
      color: white;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 1.15rem;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
    }

    .contact-note {
      margin: 18px auto 0;
      max-width: 360px;
      font-size: 1.2rem;
      font-weight: 700;
      color: #3d6f99;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="card" id="mainCard">
    <h1>Willst du?</h1>
    <p>Bock zu zoggn?</p>

    <div class="buttons">
      <button id="yesBtn">Ja</button>
      <button id="noBtn">Nein</button>
    </div>
  </main>

  <main class="card" id="wishCard" style="display: none;">
    <h1>Perfekt ✨</h1>
    <p>Wann passt es dir am besten?</p>

    <ul class="day-list">
      <li>Freitag Abend</li>
      <li>Samstag</li>
      <li>Sonntag</li>
      <li>Nächste Woche</li>
    </ul>

    <div class="contact-note">
      Melde dich einfach bei mir, welcher der Tage dir am besten passt 😄
    </div>
  </main>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const mainCard = document.getElementById("mainCard");
    const wishCard = document.getElementById("wishCard");

    const safeDistance = 115;

    let noButtonActivated = false;

    function moveNoButtonAway(pointerX, pointerY) {
      if (!noButtonActivated) {
        noButtonActivated = true;
        noBtn.style.position = "fixed";
      }

      const rect = noBtn.getBoundingClientRect();
      const buttonCenterX = rect.left + rect.width / 2;
      const buttonCenterY = rect.top + rect.height / 2;

      const distance = Math.hypot(pointerX - buttonCenterX, pointerY - buttonCenterY);

      if (distance > safeDistance) return;

      const maxX = window.innerWidth - rect.width - 12;
      const maxY = window.innerHeight - rect.height - 12;

      let newX;
      let newY;
      let tries = 0;

      do {
        newX = Math.random() * maxX + 6;
        newY = Math.random() * maxY + 6;
        tries++;
      } while (Math.hypot(pointerX - newX, pointerY - newY) < safeDistance * 1.4 && tries < 60);

      noBtn.style.left = `${newX}px`;
      noBtn.style.top = `${newY}px`;
    }

    noBtn.addEventListener("mousemove", (event) => {
      moveNoButtonAway(event.clientX, event.clientY);
    });

    noBtn.addEventListener("touchstart", (event) => {
      const touch = event.touches[0];
      if (touch) moveNoButtonAway(touch.clientX, touch.clientY);
    }, { passive: true });

    noBtn.addEventListener("mouseenter", () => {
      const rect = noBtn.getBoundingClientRect();
      moveNoButtonAway(rect.left + rect.width / 2, rect.top + rect.height / 2);
    });

    noBtn.addEventListener("click", (event) => {
      event.preventDefault();
      moveNoButtonAway(event.clientX, event.clientY);
    });

    yesBtn.addEventListener("click", () => {
      noBtn.style.display = "none";
      mainCard.style.display = "none";
      wishCard.style.display = "block";
    });
  </script>
</body>
</html>
